[pytest]
# Découverte automatique des tests
testpaths = .

# Mode asyncio : "auto" → tous les tests async sont détectés automatiquement
asyncio_mode = auto

# Affichage verbeux par défaut
addopts =
    -v
    --tb=short
    --no-header
    -q

# Marqueurs personnalisés (évite les warnings)
markers =
    asyncio: tests asynchrones
    integration: tests nécessitant une DB réelle (skip en CI)
    slow: tests lents
