global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "obrail-api"
    static_configs:
      - targets: ["host.docker.internal:8000"]

  - job_name: "cadvisor"
    static_configs:
      - targets: ["host.docker.internal:8080"]

  - job_name: "postgres"
    static_configs:
      - targets: ["host.docker.internal:9187"]