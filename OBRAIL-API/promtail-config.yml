server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://host.docker.internal:3100/loki/api/v1/push

scrape_configs:
  - job_name: obrail-api
    static_configs:
      - targets:
          - localhost
        labels:
          job: obrail-api
          __path__: /logs/app.log