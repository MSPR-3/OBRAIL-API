name: CI API ObRail

on:
  push:
    branches: [ main, develop, docker ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  pytest-validation:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:15-3.4
        env:
          POSTGRES_DB: obrail_test
          POSTGRES_USER: obrail_user
          POSTGRES_PASSWORD: obrail_password
        ports:
          - 5434:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout du code API
        uses: actions/checkout@v4

      # Étape indispensable : récupérer le script SQL du dépôt BDD
      - name: Checkout du code BDD (pour le schéma)
        uses: actions/checkout@v4
        with:
          repository: MSPR-3/OBRAIL-BDD
          path: bdd-repo # On le clone dans un sous-dossier

      - name: Configuration de Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Installation des dépendances
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-asyncio httpx sqlalchemy asyncpg databases
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Attente et Initialisation de la Base (Fix 500 Errors)
        run: |
          sudo apt-get install -y postgresql-client
          # Attente que Postgres soit prêt
          until pg_isready -h localhost -p 5434 -U obrail_user; do
            echo "En attente de Postgres..."
            sleep 2
          done
          # Injection du schéma depuis le chemin spécifié
          psql -h localhost -p 5434 -U obrail_user -d obrail_test -f bdd-repo/db/init_obrail_db.sql
        env:
          PGPASSWORD: obrail_password

      - name: Exécution des tests Pytest
        env:
          DATABASE_URL: postgresql+asyncpg://obrail_user:obrail_password@localhost:5434/obrail_test
          PYTHONPATH: . 
        run: |
          pytest tests/ --asyncio-mode=auto --cov=. --cov-report=xml

      - name: Archivage des rapports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: coverage.xml