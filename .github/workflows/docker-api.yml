name: Docker - Build & Push API

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── CD : déploiement automatique sur env de test (main only) ──
  deploy-test:
    name: Deploy → test
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger OBRAIL-Infrastructure deploy
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GH_DEPLOY_TOKEN }}
          repository: ${{ github.repository_owner }}/OBRAIL-Infrastructure
          event-type: deploy-test
          client-payload: |
            {
              "service": "api",
              "sha": "${{ github.sha }}",
              "ref": "${{ github.ref_name }}"
            }

  # ── Déclenche le déploiement sur l'env de test (main only) ──
  trigger-deploy:
    name: Trigger Deploy (test)
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Dispatch deploy → OBRAIL-Infrastructure
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GH_DEPLOY_TOKEN }}
          repository: ${{ github.repository_owner }}/OBRAIL-Infrastructure
          event-type: deploy-test
          client-payload: |
            {
              "service": "api",
              "sha": "${{ github.sha }}",
              "ref": "${{ github.ref_name }}"
            }
